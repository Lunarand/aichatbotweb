name: Run LLM via Cloudflare Tunnel

on: 
  workflow_dispatch: 

jobs:
  serve-llm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Download Qwen 2.5 3B Uncensored GGUF
        run: |
          wget -q --show-progress -O model.gguf https://huggingface.co/mradermacher/Qwen2.5-3B-Instruct-uncensored-GGUF/resolve/main/Qwen2.5-3B-Instruct-uncensored.Q4_K_M.gguf
          echo "3B Model downloaded."

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Boot FastAPI Backend
        run: |
          echo "Starting Uvicorn server..."
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          
          echo "Waiting 45 seconds for 3B model to load into RAM..."
          sleep 45 
          
          echo "--- SERVER LOGS ---"
          cat server.log
          echo "-------------------"
          
          curl -s http://127.0.0.1:8000/ > /dev/null && echo "Server is up!" || echo "Server failed to start."

      - name: Start Cloudflare Tunnel
        run: |
          echo "Starting Cloudflare tunnel..."
          cloudflared tunnel --url http://127.0.0.1:8000
