<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --primary: #00ffcc; --text: #e0e0e0; }
        * { box-sizing: border-box; }
        
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        #header { padding: 1rem; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #header-title { font-weight: bold; display: flex; align-items: center; gap: 10px; }
        #status { font-size: 0.8rem; color: #888; }
        
        select { background: var(--bg); color: var(--text); border: 1px solid #333; padding: 0.4rem; border-radius: 0.3rem; outline: none; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth; }
        
        .message { max-width: 85%; padding: 0.85rem 1rem; border-radius: 1rem; line-height: 1.5; word-wrap: break-word; }
        .message p { margin: 0 0 0.5rem 0; }
        .message p:last-child { margin: 0; }
        .message pre { background: #000; padding: 0.5rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .message code { background: #000; padding: 0.2rem 0.4rem; border-radius: 0.3rem; font-family: monospace; }
        
        .user { background: var(--surface); border: 1px solid #333; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .bot { background: #2a2a2a; border-left: 3px solid var(--primary); align-self: flex-start; border-bottom-left-radius: 0.2rem; }
        
        #input-area { padding: 0.8rem; background: var(--surface); display: flex; gap: 0.5rem; border-top: 1px solid #333; }
        input { flex: 1; padding: 0.85rem; border: 1px solid #333; border-radius: 0.5rem; background: var(--bg); color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        button { padding: 0.85rem 1.25rem; background: var(--primary); border: none; border-radius: 0.5rem; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="header">
        <div id="header-title">Qwen 3B <span id="status">Ready</span></div>
        <select id="lang-select">
            <option value="english">English</option>
            <option value="hindi">Hinglish</option>
        </select>
    </div>
    
    <div id="chat-container"></div>
    
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const langSelect = document.getElementById('lang-select');
        const status = document.getElementById('status');
        
        let chatHistory = [];

        function appendMessage(sender, text, isHtml = false) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if (isHtml) {
                div.innerHTML = text;
            } else {
                div.textContent = text;
            }
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            appendMessage('user', text);
            chatHistory.push({ role: "user", content: text });
            
            userInput.value = '';
            sendBtn.disabled = true;
            status.textContent = "(Searching/Thinking...)";
            status.style.color = "var(--primary)";

            const botBubble = appendMessage('bot', '');
            let fullBotResponse = "";

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        messages: chatHistory,
                        language: langSelect.value 
                    })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                status.textContent = "(Typing...)";
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    fullBotResponse += chunk; 
                    
                    botBubble.innerHTML = marked.parse(fullBotResponse);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
                
                chatHistory.push({ role: "assistant", content: fullBotResponse });

            } catch (err) {
                botBubble.textContent = "[Connection Error: Check Server]";
            }
            
            sendBtn.disabled = false;
            status.textContent = "Ready";
            status.style.color = "#888";
            userInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
