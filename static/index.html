<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored LLM Chat</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --primary: #00ffcc; --text: #e0e0e0; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 1rem; background: var(--surface); text-align: center; font-weight: bold; border-bottom: 1px solid #333; position: relative; }
        #status { font-size: 0.8rem; color: #888; position: absolute; right: 1rem; top: 1.2rem; }
        #chat-container { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 0.85rem 1rem; border-radius: 1rem; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
        .user { background: var(--surface); border: 1px solid #333; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .bot { background: #2a2a2a; border-left: 3px solid var(--primary); align-self: flex-start; border-bottom-left-radius: 0.2rem; }
        #input-area { padding: 1rem; background: var(--surface); display: flex; gap: 0.5rem; border-top: 1px solid #333; }
        input { flex: 1; padding: 0.85rem; border: 1px solid #333; border-radius: 0.5rem; background: var(--bg); color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        button { padding: 0.85rem 1.25rem; background: var(--primary); border: none; border-radius: 0.5rem; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="header">
        Uncensored LLM
        <div id="status">Ready</div>
    </div>
    <div id="chat-container"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const status = document.getElementById('status');

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            appendMessage('user', text);
            userInput.value = '';
            sendBtn.disabled = true;
            status.textContent = "Searching web...";
            status.style.color = "var(--primary)";

            const botBubble = appendMessage('bot', '');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                status.textContent = "Typing...";
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    botBubble.textContent += decoder.decode(value, { stream: true });
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (err) {
                botBubble.textContent = "[Connection Error]";
            }
            sendBtn.disabled = false;
            status.textContent = "Ready";
            status.style.color = "#888";
            userInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
